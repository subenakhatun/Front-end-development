  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

  <!-- Initialize Swiper -->
  <script>
    
    var swiper = new Swiper(".ASwiper", {
      spaceBetween: 30,
      centeredSlides: true,
      autoplay: {
        delay: 1000,
        disableOnInteraction: false
      },
      
      freeMode: true, 

        breakpoints: {
            768: {
            slidesPerView: 1,
            },
            1024: {
            slidesPerView: 3,
            },
