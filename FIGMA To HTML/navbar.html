<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodzy - Header Design</title>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
        }
    </style>
</head>
<body class="bg-white">

    <header class="w-full">
        <nav class="border-b border-gray-100 px-4 lg:px-10 py-3">
            <div class="max-w-[1400px] mx-auto flex justify-between items-center text-[#253D4E]">
                
                <div class="lg:hidden">
                    <button class="btn btn-ghost btn-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                </div>

                <ul class="hidden lg:flex items-center gap-8 font-bold text-[16px]">
                    <li><a href="#" class="hover:text-[#3BB77E] transition">Home</a></li>
                    <li class="flex items-center gap-1 cursor-pointer hover:text-[#3BB77E]">
                        Category 
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </li>
                    <li class="flex items-center gap-1 cursor-pointer hover:text-[#3BB77E]">
                        Products 
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </li>
                    <li class="flex items-center gap-1 cursor-pointer hover:text-[#3BB77E]">
                        Pages 
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </li>
                    <li class="flex items-center gap-1 cursor-pointer hover:text-[#3BB77E]">
                        Blog 
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </li>
                    <li class="flex items-center gap-1 cursor-pointer hover:text-[#3BB77E]">
                        Elements 
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </li>
                </ul>

                <div class="flex items-center gap-2 font-semibold text-[#3BB77E]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                    <span class="text-sm">+123 ( 456 ) ( 7890 )</span>
                </div>
            </div>
        </nav>

        <div class="px-4 lg:px-10 py-6">
            <div class="max-w-[1400px] mx-auto flex flex-col lg:flex-row items-center justify-between gap-6">
                
                <div class="flex items-center gap-3">
                    <div class="avatar">
                        <div class="w-14 h-14 rounded-full ring ring-[#3BB77E] ring-offset-base-100 ring-offset-2">
                            <img src="https://img.icons8.com/color/96/chef.png" alt="Chef Logo" />
                        </div>
                    </div>
                    <div>
                        <h1 class="text-4xl font-bold text-[#253D4E] tracking-tight">Foodzy</h1>
                        <p class="text-[12px] text-gray-400 uppercase font-semibold tracking-widest">A Treasure of Tastes</p>
                    </div>
                </div>

                <div class="w-full max-w-2xl">
                    <div class="join w-full border-2 border-[#BCE3C9] rounded-md">
                        <input class="input join-item w-full focus:outline-none text-[#253D4E]" placeholder="Search For Items..." />
                        <select class="select join-item border-l border-[#BCE3C9] bg-white focus:outline-none font-bold text-[#253D4E]">
                            <option disabled selected>All Categories</option>
                            <option>Milks and Dairies</option>
                            <option>Wines & Drinks</option>
                            <option>Fresh Seafood</option>
                        </select>
                        <button class="btn join-item bg-[#FF4B3E] hover:bg-[#e64438] border-none px-6">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                        </button>
                    </div>
                </div>

                <div class="flex items-center gap-8 text-[#253D4E] font-semibold">
                    <div class="flex items-center gap-2 cursor-pointer group">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:text-[#3BB77E]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                        <span class="group-hover:text-[#3BB77E]">Account</span>
                    </div>
                    
                    <div class="flex items-center gap-2 cursor-pointer group">
                        <div class="indicator">
                            <span class="indicator-item badge badge-success badge-sm text-white border-none">4</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:text-[#3BB77E]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
                        </div>
                        <span class="group-hover:text-[#3BB77E]">Wishlist</span>
                    </div>

                    <div class="flex items-center gap-2 cursor-pointer group">
                        <div class="indicator">
                            <span class="indicator-item badge badge-success badge-sm text-white border-none">2</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:text-[#3BB77E]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                        </div>
                        <span class="group-hover:text-[#3BB77E]">Cart</span>
                    </div>
                </div>

            </div>
        </div>
    </header>

</body>
</html>
